name: Build and Auto-Commit Artifact

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt bats

      - name: Run Build Script
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Run Unit Tests
        run: bats tests/

      - name: Commit compiled artifact
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add usr/lib/matrix/matrix_bot
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-build monolithic matrix_bot"
            git push
          fi
