name: Build and Auto-Commit Artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt bats

      - name: Run Build Script
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Run Unit Tests (BATS)
        run: bats tests/

      - name: Commit compiled artifacts
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add usr/lib/matrix/matrix_bot* usr/lib/matrix/matrix_send* etc/init.d/matrixbot*
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-build all artifacts"
            git push
          fi
