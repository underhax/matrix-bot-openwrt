name: Build and Auto-Commit Artifact

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt bats

      - name: Run Build Script
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Run Unit Tests (BATS)
        run: bats tests/

      - name: Commit compiled artifacts
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add usr/lib/matrix/matrix_bot* usr/lib/matrix/matrix_send* etc/init.d/matrixbot*
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-build all artifacts"
            git push
          fi
