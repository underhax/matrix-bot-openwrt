name: CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats shfmt

      - name: Enable OpenWrt ash bashisms compatibility
        run: sudo ln -sf /bin/bash /bin/sh

      - name: Build Artifacts
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Run BATS Unit Tests
        env:
          BATS_SHELL: /bin/bash
        run: |
          echo "shopt -u patsub_replacement 2>/dev/null || true" > /tmp/compat.sh
          BASH_ENV=/tmp/compat.sh bats tests/
