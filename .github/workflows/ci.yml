name: CI Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Lua
        uses: leafo/gh-actions-lua@6919171ccf181b826f44b9bca76307b577217377 # v13.0.0
        with:
          luaVersion: "5.1.5"

      - name: Setup Luarocks
        uses: leafo/gh-actions-luarocks@35d062def313a7699a0d513e996bcf4352f05389 # v6.1.0

      - name: Install Dependencies
        run: |
          luarocks install luacheck
          luarocks install busted

      - name: Run Luacheck
        run: luacheck packages/matrixbot/src/ packages/luci-app-matrixbot/

      - name: Run Busted Tests
        run: LUA_PATH="./packages/matrixbot/src/usr/lib/lua/?.lua;;" busted tests/
