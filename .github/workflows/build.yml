name: Build OpenWrt Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
    contents: read

jobs:
  build:
    name: Build OpenWrt APK
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [x86_64]
        version: ["25.12.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set Package Version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION//-/_}
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION/" packages/matrixbot/Makefile
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION/" packages/luci-app-matrixbot/Makefile

      - name: Build Package
        uses: openwrt/gh-action-sdk@7fc2640243284ecc44f4a9c3f749a61746ee02cb # v11
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.version }}
          FEED_DIR: ${{ github.workspace }}
          PACKAGES: matrixbot luci-app-matrixbot
          NO_SHFMT_CHECK: 1

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openwrt-packages
          path: |
            bin/packages/**/matrixbot-*.apk
            bin/packages/**/luci-app-matrixbot-*.apk

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openwrt-packages
          path: release_assets

      - name: Publish Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release_assets/**/matrixbot-*.apk
            release_assets/**/luci-app-matrixbot-*.apk
